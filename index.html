<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .secure-btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .secure-btn:active {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- A user gesture must trigger this specific intent structure -->
    <a href="intent://example.com#Intent;scheme=https;package=com.android.chrome;B.incognito=true;end;" class="secure-btn">
        Open Securely in Incognito
    </a>

</body>
</html>
